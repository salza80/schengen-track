      faq:
        q1:
          answer: A regra dos 90/180 dias significa que você pode permanecer na Área Schengen por até 90 dias em qualquer período de 180 dias sem visto, se for de um país isento de visto. O período de 180 dias é uma janela móvel calculada a partir da data atual.
          question: O que é a regra de 90/180 dias Schengen?
        q10:
          answer: Sim, a Calculadora Schengen é totalmente gratuita. Você pode calcular suas estadias, adicionar registros de viagem ilimitados e até criar uma conta gratuita para salvar seus dados em vários dispositivos. Não é necessário cartão de crédito e não há taxas ocultas.
          question: A Calculadora Schengen é gratuita para usar?
        q2:
          answer: O período de 180 dias é calculado para trás a partir da sua data atual ou da data planejada de saída. Para cada dia em que você pretende permanecer, a calculadora verifica quantos dias você já passou na Área Schengen nos 180 dias anteriores. Você não pode exceder 90 dias no total dentro desse período móvel.
          question: Como é calculado o período de 180 dias?
        q3:
          answer: Não. A regra 90/180 é um cálculo móvel. Sair e entrar novamente não redefine sua permissão de 90 dias. Você precisa esperar até que dias de visitas anteriores saiam da janela de 180 dias. A Calculadora Schengen ajuda você a acompanhar exatamente quando poderá retornar.
          question: Posso redefinir meus 90 dias saindo da Área Schengen?
        q4:
          answer: Não. Cidadãos do Reino Unido não precisam de visto para estadias curtas, de até 90 dias em qualquer período de 180 dias, na Área Schengen. No entanto, a partir do quarto trimestre de 2026, cidadãos do Reino Unido precisarão de uma autorização ETIAS (Sistema Europeu de Informação e Autorização de Viagem) antes de viajar.
          question: Cidadãos do Reino Unido precisam de visto para visitar a Área Schengen após o Brexit?
        q5:
          answer: Permanecer além do permitido pode resultar em consequências sérias, incluindo multas, deportação, proibição de entrada, normalmente de 1 a 5 anos, e dificuldades para obter vistos ou autorizações de viagem no futuro. Sempre confirme que você está cumprindo a regra 90/180 dias e saia antes de exceder sua permanência permitida.
          question: O que acontece se eu exceder meus 90 dias na Área Schengen?
        q6:
          answer: Em maio de 2026, a Área Schengen tem 29 países, incluindo Áustria, Bélgica, Bulgária, Croácia, República Tcheca, Dinamarca, Estônia, Finlândia, França, Alemanha, Grécia, Hungria, Islândia, Itália, Letônia, Liechtenstein, Lituânia, Luxemburgo, Malta, Países Baixos, Noruega, Polônia, Portugal, Romênia, Eslováquia, Eslovênia, Espanha, Suécia e Suíça. Bulgária e Romênia aderiram plenamente em 1 de janeiro de 2025.
          question: Quais países estão na Área Schengen em 2026?
        q7:
          answer: Sim. Qualquer dia em que você esteja fisicamente presente na Área Schengen conta para o limite de 90 dias, incluindo dias de trânsito e dias em que você esteja apenas passando por aeroportos ou estações de trem. O dia de entrada e o dia de saída contam como dias completos.
          question: Dias em trânsito contam para meu limite de 90 dias?
        q8:
          answer: ETIAS (Sistema Europeu de Informação e Autorização de Viagem) é uma autorização prévia de viagem exigida a partir do quarto trimestre de 2026 para viajantes isentos de visto que visitam países europeus que exigem ETIAS. Cidadãos de países como EUA, Reino Unido, Canadá, Austrália e outros que atualmente não precisam de visto precisarão da aprovação ETIAS. É semelhante ao ESTA dos EUA e custará 20 EUR, com algumas isenções. Será válido por até 3 anos ou até o passaporte expirar, o que ocorrer primeiro.
          question: O que é ETIAS e quem precisa dele?
        q9:
          answer: Sim! A calculadora atende tanto viajantes isentos de visto quanto pessoas com vistos Schengen de curta duração. Basta inserir os dados do visto, como data de início, data final e número de entradas, além do seu histórico de viagens. A calculadora acompanhará tanto o limite de 90/180 dias quanto as restrições específicas do seu visto.
          question: Posso usar a Calculadora Schengen se eu tiver um visto Schengen?
