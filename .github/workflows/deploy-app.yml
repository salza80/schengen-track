name: Deploy App

on:
  workflow_call:
    inputs:
      stack_name:
        required: true
        type: string
      cloudfront_distribution_id:
        required: true
        type: string
      robots_source:
        required: false
        type: string
        default: ''
      recache_urls_file:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

env:
  AWS_ROLE_ARN: arn:aws:iam::360298971790:role/sst3-template-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: deployment/.nvmrc

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-session-name: schengen-track-deploy-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Install CDK
        run: npm install -g aws-cdk@2.1129.0

      - name: Install CDK Dependencies
        run: npm ci
        working-directory: ./deployment

      - name: Copy secrets file
        run: cp secrets.yml.example secrets.yml
        working-directory: ./src/config

      - name: Copy robots.txt override
        if: ${{ inputs.robots_source != '' }}
        env:
          ROBOTS_SOURCE: ${{ inputs.robots_source }}
        run: cp "$ROBOTS_SOURCE" ../public/robots.txt
        working-directory: ./src/config

      - name: CDK Deploy
        env:
          STACK_NAME: ${{ inputs.stack_name }}
        run: cdk deploy "$STACK_NAME" --require-approval never
        working-directory: ./deployment

      - name: Resolve Ops Lambda Function
        id: ops_lambda
        uses: ./.github/actions/resolve-ops-lambda
        with:
          stack-name: ${{ inputs.stack_name }}

      - name: Run database migrations
        timeout-minutes: 20
        env:
          OPS_FUNCTION_NAME: ${{ steps.ops_lambda.outputs.ops_function_name }}
        run: ./deployment/scripts/invoke_ops_lambda.sh '{"command":"unlock_and_migrate"}' "Database migrations" /tmp/ops-response.json

      - name: Update countries data
        timeout-minutes: 20
        env:
          OPS_FUNCTION_NAME: ${{ steps.ops_lambda.outputs.ops_function_name }}
        run: ./deployment/scripts/invoke_ops_lambda.sh '{"command":"update_countries"}' "Countries data update" /tmp/update-countries.json

  cacheInvalidate:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-session-name: schengen-track-cache-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Set deployment timestamp
        run: |
          echo "Setting deployment timestamp in Parameter Store..."
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          aws ssm put-parameter \
            --name "/schengen/deployment-timestamp" \
            --value "$current_time" \
            --type String \
            --overwrite
          echo "✓ Deployment timestamp set to: $current_time"

      - name: Perform CloudFront Invalidation
        id: cloudfront_invalidation
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}
        run: |
          set -euo pipefail
          invalidation_id=$(aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths '/*' --query Invalidation.Id --output text)
          echo "invalidationId=${invalidation_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for CloudFront Invalidation
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}
          INVALIDATION_ID: ${{ steps.cloudfront_invalidation.outputs.invalidationId }}
        run: aws cloudfront wait invalidation-completed --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --id "$INVALIDATION_ID"

      - name: Recache main urls
        if: ${{ inputs.recache_urls_file != '' }}
        env:
          RECACHE_URLS_FILE: ${{ inputs.recache_urls_file }}
        run: ./recache.sh "$RECACHE_URLS_FILE"
        working-directory: ./deployment/scripts
