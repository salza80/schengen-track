      calculator_description: A Calculadora Schengen calcula o tempo de permanência que você tem permissão para viajar na Área Schengen com um visto Schengen de curta duração. Você pode usá-la para acompanhar ou prever todas as suas visitas dentro da Área Schengen para saber quantos dias você tem restantes antes de ter que sair.
