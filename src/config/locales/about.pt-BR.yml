          description: Você pode rastrear viagens para várias pessoas usando a mesma conta. Use o seletor de pessoas no topo da página para adicionar e alternar entre diferentes viajantes. Cada pessoa pode ter sua própria nacionalidade, viagens e informações de visto. Isso é útil para famílias ou ao gerenciar viagens para várias pessoas.
          title: 'Múltiplas Pessoas:'
        step_1:
          description: Selecione sua nacionalidade. Você pode alterá-la no topo da página, no cabeçalho.
          title: 'Etapa 1:'
        step_2:
          description: Se necessário, insira os dados do seu visto Schengen de curta duração. Essa seção aparecerá abaixo do registro de viagens apenas quando for necessária.
          title: 'Etapa 2:'
        step_3:
          description_1: Adicione seu histórico de viagens, passadas e futuras. Você deve incluir pelo menos todas as viagens dentro da Área Schengen realizadas nos últimos 180 dias.
          description_2: O ideal é registrar todos os seus deslocamentos entre países, tanto Schengen quanto não Schengen, inclusive viagens de um país Schengen para outro, pois nem sempre é evidente quais países fazem parte do acordo. A data de entrada é o dia em que você chega, e a data de saída é o dia em que você sai. Não se preocupe se a data de saída coincidir com a data de entrada da próxima visita; a calculadora não contará dias em dobro ao calcular sua permanência na Área Schengen.
          title: 'Etapa 3:'
        step_4:
          description: Revise as informações sobre a validade da viagem e o tempo restante que você pode permanecer na Área Schengen. Use a calculadora para testar cenários alterando seu plano de viagem pretendido.
          title: 'Etapa 4:'
        step_5:
          description: Para salvar seu histórico de viagens, registre-se e faça login. Seus dados existentes de visitante serão copiados para a nova conta. Você pode criar uma conta na Calculadora Schengen ou usar o Facebook para entrar e se registrar.
          optional: true
          title: 'Etapa 5: (opcional)'
