name: Deploy-Prod

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/test-suite.yml
    with:
      ref: 'master'

  deploy:
    needs: tests
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-app.yml
    with:
      stack_name: SchengTrackProd
      cloudfront_distribution_id: E1KF4KLAR0V084
      recache_urls_file: urls-prod.txt
    secrets: inherit
