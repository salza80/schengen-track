name: Deploy App

on:
  workflow_call:
    inputs:
      stack_name:
        required: true
        type: string
      cloudfront_distribution_id:
        required: true
        type: string
      robots_source:
        required: false
        type: string
        default: ''
      recache_urls_file:
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.18.0'

      - name: Install AWS CLI
        run: |
          sudo apt-get install -y python3-pip
          pip3 install awscliv2

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Install CDK
        run: npm install -g aws-cdk@latest

      - name: Install CDK Dependencies
        run: npm install
        working-directory: ./deployment

      - name: Copy secrets file
        run: cp secrets.yml.example secrets.yml
        working-directory: ./src/config

      - name: Copy robots.txt override
        if: ${{ inputs.robots_source != '' }}
        run: cp "${{ inputs.robots_source }}" ../public/robots.txt
        working-directory: ./src/config

      - name: CDK Deploy
        run: cdk deploy "${{ inputs.stack_name }}" --require-approval never
        working-directory: ./deployment

      - name: Resolve Ops Lambda Function
        id: ops_lambda
        run: |
          STACK_NAME="${{ inputs.stack_name }}"
          OPS_FUNCTION_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='OpsLambdaFunctionName'].OutputValue" --output text)
          if [ -z "$OPS_FUNCTION_NAME" ] || [ "$OPS_FUNCTION_NAME" = "None" ]; then
            echo "Failed to resolve Ops Lambda function name"
            exit 1
          fi
          echo "ops_function_name=$OPS_FUNCTION_NAME" >> $GITHUB_OUTPUT

      - name: Run database migrations
        timeout-minutes: 20
        env:
          OPS_FUNCTION_NAME: ${{ steps.ops_lambda.outputs.ops_function_name }}
        run: ./deployment/scripts/invoke_ops_lambda.sh '{"command":"unlock_and_migrate"}' "Database migrations" /tmp/ops-response.json

      - name: Update countries data
        timeout-minutes: 20
        env:
          OPS_FUNCTION_NAME: ${{ steps.ops_lambda.outputs.ops_function_name }}
        run: ./deployment/scripts/invoke_ops_lambda.sh '{"command":"update_countries"}' "Countries data update" /tmp/update-countries.json

      - name: Clean up guest users
        timeout-minutes: 20
        env:
          OPS_FUNCTION_NAME: ${{ steps.ops_lambda.outputs.ops_function_name }}
        run: |
          set -euo pipefail
          ./deployment/scripts/invoke_ops_lambda.sh '{"command":"guest_cleanup","params":{"max_batches":5}}' "Guest cleanup" /tmp/guest-cleanup.json
          stats=$(jq -c -e '.body | fromjson | .stats' /tmp/guest-cleanup.json)
          echo "Guest cleanup stats:"
          echo "$stats" | jq .
          deleted=$(echo "$stats" | jq -r '.deleted // 0')
          batches=$(echo "$stats" | jq -r '.batches // 0')
          remaining=$(echo "$stats" | jq -r '.remaining // 0')
          expired_rate_limits_deleted=$(echo "$stats" | jq -r '.expired_rate_limits_deleted // 0')
          echo "Deleted: $deleted guest users in $batches batches"
          echo "Remaining old guest users: $remaining"
          echo "Deleted expired API rate limit rows: $expired_rate_limits_deleted"

  cacheInvalidate:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install AWS CLI
        run: |
          sudo apt-get install -y python3-pip
          pip3 install awscliv2

      - name: Configure AWS Credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set deployment timestamp
        run: |
          echo "Setting deployment timestamp in Parameter Store..."
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          aws ssm put-parameter \
            --name "/schengen/deployment-timestamp" \
            --value "$current_time" \
            --type String \
            --overwrite
          echo "✓ Deployment timestamp set to: $current_time"

      - name: Perform CloudFront Invalidation
        id: cloudfront_invalidation
        run: |
          invalidation_id=$(aws cloudfront create-invalidation --distribution-id "${{ inputs.cloudfront_distribution_id }}" --paths '/*' --query Invalidation.Id --output text)
          echo "invalidationId=${invalidation_id}" >> $GITHUB_OUTPUT

      - name: Wait for CloudFront Invalidation
        run: aws cloudfront wait invalidation-completed --distribution-id "${{ inputs.cloudfront_distribution_id }}" --id "${{ steps.cloudfront_invalidation.outputs.invalidationId }}"

      - name: Recache main urls
        if: ${{ inputs.recache_urls_file != '' }}
        run: ./recache.sh "${{ inputs.recache_urls_file }}"
        working-directory: ./deployment/scripts
