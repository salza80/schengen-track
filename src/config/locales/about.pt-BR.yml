      exempt_countries_conditions: Observe que há condições para alguns desses países. Por exemplo, cidadãos da Albânia, Bósnia-Herzegovina, Geórgia, Moldávia, Montenegro, Sérvia e Ucrânia são isentos da obrigação de visto apenas se o passaporte contiver dados biométricos. Cidadãos de Kosovo são isentos apenas com passaportes biométricos emitidos de acordo com os padrões da ICAO. Para a lista completa e atualizada com todas as condições, consulte o regulamento oficial da UE.
