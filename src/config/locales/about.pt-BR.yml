pt-BR:
  about:
    about:
      90_days_definition_blockquote: "“90 days in any 180-day period […]“. “A data de entrada será considerada como o primeiro dia de permanência no território dos Estados-Membros e a data de saída será considerada como o último dia de permanência no território dos Estados-Membros. Os períodos de permanência autorizados sob uma autorização de residência ou visto de longa duração não serão levados em conta no cálculo da duração da permanência no território dos Estados-Membros.”\n"
      abolished_internal_borders: Tendo abolido suas fronteiras internas, os Estados Schengen possuem um acordo de fronteira externa comum com base nas regras do Schengen. Isso torna muito conveniente para turistas viajarem entre os países incluídos na área Schengen. No entanto, é importante entender as regras sobre qual visto é necessário antes de entrar na área (se houver), e quanto tempo você pode permanecer.
      additional_requirements:
        first_paragraph: Alguns países têm acordos adicionais de isenção de visto com países dentro da área Schengen, permitindo uma permanência adicional de 90 dias em um período de 180 dias; no entanto, isso será incluído nos 90 dias para outros países Schengen. Esses acordos adicionais são frequentemente pouco conhecidos pelos viajantes!
        heading: Acordos Adicionais de Isenção de Visto
        second_paragraph: Atualmente, a calculadora Schengen não leva em conta Acordos Adicionais de Isenção de Visto. Por favor, faça sua própria pesquisa sobre isso.
