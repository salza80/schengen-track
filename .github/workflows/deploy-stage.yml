name: Deploy-Staging

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "deployment/**"
      - "mcp-server/**"
      - ".github/workflows/deploy-stage.yml"
      - ".github/workflows/test-suite.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "deployment/**"
      - "mcp-server/**"
      - ".github/workflows/deploy-stage.yml"
      - ".github/workflows/test-suite.yml"

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/test-suite.yml

  deploy:
    needs: tests
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-app.yml
    with:
      stack_name: RailsLambdaStack
      cloudfront_distribution_id: E2J7FXI85QUSUM
      robots_source: robots.txt.staging
      recache_urls_file: urls-staging.txt
    secrets: inherit
