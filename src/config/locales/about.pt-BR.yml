      useful_for_planning: Ela é especialmente útil para planejar viagens pela Europa que provavelmente ultrapassarão 90 dias. Ao alternar estrategicamente períodos dentro e fora da Área Schengen, você pode alongar sua viagem sem perder o controle da regra. Se você viaja frequentemente entre países, pode ser difícil acompanhar quanto tempo passou na Área Schengen, lembrar quais países fazem parte dela e calcular quando poderá retornar após passar um período fora. Basta informar sua nacionalidade, suas viagens anteriores e as viagens planejadas, e a calculadora fará o restante.
