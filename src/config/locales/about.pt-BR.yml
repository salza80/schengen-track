      other_info_content: Podemos coletar outras informações que não podem ser usadas prontamente para identificar você, como, por exemplo, o nome de domínio e o endereço IP do seu computador. Podemos usar essas informações, individualmente ou em conjunto, para administração técnica dos nossos sites, pesquisa e desenvolvimento, administração de clientes e contas, e para direcionar melhor nossos esforços de marketing.
