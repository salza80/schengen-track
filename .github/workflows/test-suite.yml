name: Test Suite

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: deployment/.nvmrc

      - uses: ruby/setup-ruby@v1.310.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true
          working-directory: src

      - name: Install Chrome and ChromeDriver for Selenium tests
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2.1.0
        with:
          chrome-version: stable
          install-chromedriver: true
        
      - name: Verify Chrome setup
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - run: bundle exec rails db:create
        working-directory: src
        env:
          CI: true

      - run: bundle exec rails db:migrate
        working-directory: src
        env:
          CI: true

      - name: Check i18n translations
        run: bundle exec rake i18n:check
        working-directory: src
        env:
          CI: true

      - name: Run tests
        run: bundle exec rake test
        working-directory: src
        env:
          CI: true
          RAILS_ENV: test
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: Run MCP server tests
        run: python3 -m unittest discover -s mcp-server/tests

      - name: Install CDK dependencies
        run: npm ci
        working-directory: deployment

      - name: Build CDK
        run: npm run build
        working-directory: deployment
