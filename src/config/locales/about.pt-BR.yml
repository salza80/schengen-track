      eu_notice_content: As operações da Calculadora Schengen estão localizadas principalmente nos Estados Unidos. Se você nos fornecer informações, elas serão transferidas para fora da União Europeia (UE), para os Estados Unidos. Ao nos fornecer informações pessoais, você consente com seu armazenamento e uso conforme descrito aqui.
      eu_notice_title: Aviso para usuários da União Europeia
      external_storage_content: Podemos armazenar seus dados em servidores fornecidos por provedores terceirizados de hospedagem com os quais contratamos serviços.
      external_storage_title: Sites externos de armazenamento de dados
      introduction_content: A Calculadora Schengen valoriza a privacidade de seus visitantes. Esta política de privacidade resume quais informações podemos coletar de um usuário registrado ou outro visitante, e o que faremos ou não faremos com elas. Observe que esta política de privacidade não rege a coleta e o uso de informações por empresas que a Calculadora Schengen não controla, nem por indivíduos que não sejam empregados ou gerenciados pela Calculadora Schengen. Se você visitar um site mencionado ou vinculado por nós, revise a política de privacidade desse site antes de fornecer informações.
