      schengen_area_description: A Área Schengen compreende 29 países europeus sem fronteiras internas. Cidadãos, bem como muitos nacionais de fora da UE, viajantes a negócios e turistas, podem circular livremente sem controles de fronteira internos. Desde 1985, ela se expandiu para incluir quase todos os Estados da UE e alguns países associados de fora da UE.
